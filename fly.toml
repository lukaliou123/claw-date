app = "claw-date"
primary_region = "nrt"

[build]

[mounts]
  source = "claw_date_data"
  destination = "/data"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  TURSO_DATABASE_URL = "file:/data/claw-date.db"
  LLM_BASE_URL = "https://api.deepseek.com"
  LLM_MODEL = "deepseek-chat"
  MOCK_LLM = "false"
  MATCH_SCAN_INTERVAL_SECONDS = "30"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
